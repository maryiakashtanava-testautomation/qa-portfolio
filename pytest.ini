[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --html=reports/report.html
    --self-contained-html
    --tb=short
    --headed
    -v

asyncio_default_fixture_loop_scope = function
markers =
    smoke: smoke tests
    regression: regression tests
    auth: authentication tests
    cart: cart and checkout tests
    ui: UI tests
    api: API tests
